<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Settings</title>
</head>

<body class="userprofile-body">
    <div class="sidebar">
        <div class="logo"></div>
        <ul>
            <li>
                <a href="{{url_for('profile')}}">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="{{ url_for('home_page') }}">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
            </li>
            <li>
                <a href="{{ url_for('my_reports') }}">
                    <i class="fas fa-flag"></i>
                    <span>My Reports</span>
                </a>
            </li>
            <li>
                <a href="{{url_for('setting')}}">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </li>
            <li>
                <a href="{{ url_for('logout') }}">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </li>
        </ul>
    </div>

    <div class="maincontent">
        <div class="header-settings">
            <h1>Settings</h1>
            <p>Manage your account settings, information, and security.</p>
        </div>
        <div class="profilesummary">
            <h2>Profile Summary</h2>
            <div class="summary-info">
                <form action="/upload_setting" method="post" enctype="multipart/form-data">
                    <label for="profile_image" class="picture-summary"> <!--click icons open file picker-->
                        <img id="preview-image" src="{% if profile_image %}{{ url_for('static', filename='uploads/' + profile_image) }}{% endif %}" alt="Profile Picture" {% if not profile_image %}style="display:none;"{% endif %}>
                        <i class="fa-solid fa-user" id="default-icon"{% if profile_image %}style="display:none;"{% endif %}></i>
                    </label>
                    <input type="file" id="profile_image" name="profile_image" accept="image/*" hidden>
                    <button class="upload-button" type="submit">Upload</button>
                </form>
                <div class="user-text">
                    <p><strong>Username 👤: </strong> {{ username }}</p>
                    <p><strong>Email 📧: </strong> {{ email }}</p>
                </div>
                <div class="nav-editbutton">
                    <a href="#accinfo">
                        <button class="edit-button">Edit ✏️</button>
                    </a>
                </div>
            </div>
        </div>
        <div class="information" id="accinfo">
            <h2>Account Information</h2 >
            <form action="/update_info" method="post" class="info-form">
                <div class="input-row">
                    <div class="input-group">
                        <label for="username">Username 👤 :</label>
                        <input type="text" id="username" name="username" value="{{ username }}">
                    </div>
                    <div class="input-group">
                        <label for="email">Email 📧:</label>
                        <input type="email" id="email" name="email" value="{{ email }}">
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label for="phone_num">Phone Number 📞:</label>
                        <input type="text" id="phone_num" name="phone_num" value="{{ phone_num }}" pattern="^\d{10}$" minlength="10" title="Please enter a valid 10-digit phone number">
                    </div>
                    <div class="input-group">
                        <label for="address">Address 🏠:</label>
                        <input type="text" id="address" name="address" value="{{ address }}">
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label for="gender">Gender:</label>
                        <select name="gender">
                            <option value="female" {% if gender == 'female'%} selected{% endif %}>Female</option>
                            <option value="male" {% if gender == 'male' %}selected{% endif %}>Male</option>
                        </select><br><br>
                    </div>
                    <div class="input-group">
                        <label for="role">Role:</label>
                        <select name="role">
                            <option value="buyer" {% if role == 'buyer' %}selected{% endif %}>Buyer</option>
                            <option value="seller" {% if role == 'seller' %}selected{% endif %}>Seller</option>
                        </select><br><br>
                    </div>
                </div>
                <div class="btn-container">
                    <button type="submit" class="save-button">Save Changes 💾</button>
                </div>
            </form>
        </div>



<script>
document.getElementById('profile_image').addEventListener('change',function(event){
    const file = event.target.files[0];
    if (file) {
        const preview = document.getElementById('preview-image');
        const icon = document.getElementById('default-icon');
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
    

    if (icon) {
            icon.style.display = 'none';
        }
    }
});
</script>
</body>
</html>
